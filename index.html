<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panzer Übersicht</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<!-- Fraktur -->
<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook&display=swap" rel="stylesheet">
</head>
<body style="text-align:center; background:#111; color:white;">

<h1 class="mt-5">Panzer Übersicht</h1>

<div class="container mt-5">
  <div class="row g-3">

    <!-- Deutschland -->
    <div class="col-md-4">
      <a href="deutschland.html" class="btn btn-light w-100 p-4 d-flex align-items-center justify-content-center gap-2">
        <!-- Balkenkreuz -->
        <svg width="24" height="24" viewBox="0 0 100 100">
          <rect x="40" y="10" width="20" height="80" fill="black"/>
          <rect x="10" y="40" width="80" height="20" fill="black"/>
        </svg>
        Deutschland
      </a>
    </div>

    <!-- Sowjet -->
    <div class="col-md-4">
      <a href="sowjet.html" class="btn btn-success w-100 p-4 d-flex align-items-center justify-content-center gap-2">
        <!-- Hammer & Sichel -->
        <svg width="24" height="24" viewBox="0 0 100 100">
          <path d="M70 20 A30 30 0 1 0 80 70 A20 20 0 1 1 70 20" fill="yellow"/>
          <rect x="45" y="20" width="10" height="40" fill="yellow"/>
          <rect x="40" y="15" width="20" height="10" fill="yellow"/>
        </svg>
        Sowjetunion
      </a>
    </div>

    <!-- USA -->
    <div class="col-md-4">
      <a href="usa.html" class="btn btn-success w-100 p-4 d-flex align-items-center justify-content-center gap-2">
        <!-- WW2 Stern -->
        <svg width="24" height="24" viewBox="0 0 100 100">
          <polygon points="50,10 61,40 95,40 67,60 78,90 50,70 22,90 33,60 5,40 39,40"
          fill="white"/>
        </svg>
        USA
      </a>
    </div>

  </div>
</div>

</body>
</html>
